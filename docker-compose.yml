services:
  postgres:
    image: postgres:16-alpine
    container_name: routefusion-postgres
    environment:
      POSTGRES_DB: routefusion
      POSTGRES_USER: routefusion
      POSTGRES_PASSWORD: routefusion
    ports:
      - "5432:5432"
    volumes:
      - routefusion-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routefusion -d routefusion"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  routefusion-postgres-data:
